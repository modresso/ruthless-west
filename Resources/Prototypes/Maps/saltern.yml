- type: gameMap
  id: Saltern
  mapName: 'Saltern'
  mapPath: /Maps/saltern.yml
  # Corvax-start
  minPlayers: 0
  maxPlayers: 25
  # Corvax-end
  fallback: true
  stations:
    Saltern:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Saltern {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency.yml
        - type: StationJobs
          availableJobs:
            Cowboy: [ -1, -1 ]
            Lawman: [ 5, 5 ]
            Sheriff: [ 1, 1 ]
            CountySheriff: [ 1, 1 ]
            Bandit: [ 3, 5 ]
            Slave: [ -1, -1 ]
            Robber: [ 1, 1 ]