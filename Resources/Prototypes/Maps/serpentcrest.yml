- type: gameMap
  id: Serpentcrest
  mapName: 'Serpentcrest'
  mapPath: /Maps/serpentcrest.yml
  minPlayers: 50
  stations:
    Serpentcrest:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Serpentcrest {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'B'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_syndicate.yml
        - type: StationCargoShuttle
          path: /Maps/Shuttles/cargo_syndicate.yml
        - type: StationJobs
          availableJobs:
            Cowboy: [ -1, -1 ]
            Lawman: [ 5, 5 ]
            Sheriff: [ 1, 1 ]
            CountySheriff: [ 1, 1 ]
            Bandit: [ 3, 5 ]
            Slave: [ -1, -1 ]
            Robber: [ 1, 1 ]